<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/1PBylbz.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crownstroke | Elite Custom Design Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Pacifico&family=Permanent+Marker&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;600&family=Lobster&family=Raleway:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        const sendToTerminal = (level, args) => {
          fetch('/__log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ level, args: args.map(a => 
              typeof a === 'object' ? JSON.stringify(a) : String(a)
            )})
          }).catch(() => {});
        };

        console.log = function(...args) {
          originalLog.apply(console, args);
          sendToTerminal('log', args);
        };
        console.error = function(...args) {
          originalError.apply(console, args);
          sendToTerminal('error', args);
        };
        console.warn = function(...args) {
          originalWarn.apply(console, args);
          sendToTerminal('warn', args);
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
