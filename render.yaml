services:
  - type: web
    name: crownstroke-website
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist-server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_DATABASE_URL
        fromDatabase:
          name: crownstroke-db
          property: connectionString
      - key: VITE_ADMIN_EMAIL
        sync: false
      - key: VITE_ADMIN_PASSWORD
        sync: false
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: VITE_API_URL
        value: ""
      - key: MAILNOVA_API_KEY
        sync: false
      - key: MAILNOVA_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
    autoDeploy: true
    healthCheckPath: "/api/health"

databases:
  - name: crownstroke-db
    type: postgresql